<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Projects & Skills - Aino Karjalainen</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
       
        body {
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        nav.menu ul li a {
            color: #000000;
            text-decoration: none;
        }

        nav.menu ul li a:hover {
            text-decoration: underline;
        }

        h1, h2, h3 {
            text-align: center;
        }

        /* Back to homepage */
        .cv-container {
            text-align: center;
            margin: 20px 0;
        }

        .back-link {
            text-decoration: none;
            color: #000;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Skills container */
        .skills-section {
            max-width: 1000px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .skills-category {
            margin-bottom: 40px;
        }

        .skills-category h2 {
            margin-bottom: 15px;
            text-align: left;
            font-size: 1.3rem;
        }

        /* Taidot laatikot */
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .skill-box {
            border: 1px solid #000;
            border-radius: 8px;
            padding: 15px;
            flex: 1 1 calc(33.333% - 10px);
            min-width: 200px;
            text-align: center;
            background-color: #f9f9f9;
            box-sizing: border-box;
        }

        /* Responsiivisuus: alle 700px kaksi laatikkoa per rivi */
        @media (max-width: 700px) {
            .skill-box {
                flex: 1 1 calc(50% - 10px);
            }
        }

        /* Alle 500px yksi laatikko per rivi */
        @media (max-width: 500px) {
            .skill-box {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>


<div class="cv-container">
    <a href="index.html" class="back-link">← Back to homepage</a>
</div>

<main class="skills-section">
    <h1>Skills</h1>

    <!-- Programming -->
    <div class="skills-category">
        <h2>Programming</h2>
        <div class="skills-grid">
            <div class="skill-box">Python</div>
            <div class="skill-box">C</div>
            <div class="skill-box">R</div>
            <div class="skill-box">HTML</div>
            <div class="skill-box">TypeScript</div>
            <div class="skill-box">React</div>
        </div>
    </div>

    <!-- Design -->
    <div class="skills-category">
        <h2>Design</h2>
        <div class="skills-grid">
            <div class="skill-box">Canva</div>
            <div class="skill-box">Figma</div>
            <div class="skill-box">Miro</div>
        </div>
    </div>

    <!-- Generative AI tools -->
    <div class="skills-category">
        <h2>Generative AI tools</h2>
        <div class="skills-grid">
            <div class="skill-box">ChatGPT</div>
            <div class="skill-box">Copilot</div>
            <div class="skill-box">Gemini</div>
            <div class="skill-box">DALL-E</div>
        </div>
    </div>

    <!-- Languages -->
    <div class="skills-category">
        <h2>Languages</h2>
        <div class="skills-grid">
            <div class="skill-box">Finnish (Native)</div>
            <div class="skill-box">English (Excellent)</div>
            <div class="skill-box">German (Good)</div>
        </div>
    </div>
</main>

</body>
</html>
